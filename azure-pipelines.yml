# Azure DevOps Pipeline for Playwright Test Automation
# Enterprise-grade CI/CD pipeline for Gateway UI test automation

# Trigger configuration
trigger:
  branches:
    include:
    - main
    - develop
    - feature/*
  paths:
    exclude:
    - README.md
    - docs/*
    - '*.md'

# PR trigger
pr:
  branches:
    include:
    - main
    - develop
  paths:
    exclude:
    - README.md
    - docs/*
    - '*.md'

# Build agent configuration
pool:
  vmImage: 'ubuntu-latest'

# Pipeline variables
variables:
  node_version: '20'
  npm_config_cache: $(Pipeline.Workspace)/.npm
  PLAYWRIGHT_BROWSERS_PATH: $(Pipeline.Workspace)/ms-playwright

stages:
- stage: Validate
  displayName: 'Code Quality & Security'
  jobs:
  - job: CodeQuality
    displayName: 'Code Quality Checks'
    steps:
    
    # Setup Node.js environment
    - task: NodeTool@0
      displayName: 'Use Node.js $(node_version)'
      inputs:
        versionSpec: '$(node_version)'

    # Cache npm dependencies
    - task: Cache@2
      displayName: 'Cache npm dependencies'
      inputs:
        key: 'npm | "$(Agent.OS)" | package-lock.json'
        restoreKeys: |
          npm | "$(Agent.OS)"
        path: $(npm_config_cache)

    # Install dependencies
    - script: npm ci --cache $(npm_config_cache)
      displayName: 'Install dependencies'

    # TypeScript compilation check
    - script: npx tsc --noEmit
      displayName: 'TypeScript compilation check'

    # ESLint code quality check
    - script: npx eslint . --ext .ts --format junit --output-file eslint-results.xml
      displayName: 'ESLint code quality check'
      continueOnError: true

    # Publish ESLint results
    - task: PublishTestResults@2
      displayName: 'Publish ESLint results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'eslint-results.xml'
        testRunTitle: 'ESLint Results'

- stage: Test
  displayName: 'Test Execution'
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: PlaywrightTests
    displayName: 'Playwright Test Execution'
    timeoutInMinutes: 60
    steps:
    
    # Setup Node.js environment
    - task: NodeTool@0
      displayName: 'Use Node.js $(node_version)'
      inputs:
        versionSpec: '$(node_version)'

    # Cache npm dependencies
    - task: Cache@2
      displayName: 'Cache npm dependencies'
      inputs:
        key: 'npm | "$(Agent.OS)" | package-lock.json'
        restoreKeys: |
          npm | "$(Agent.OS)"
        path: $(npm_config_cache)

    # Cache Playwright browsers
    - task: Cache@2
      displayName: 'Cache Playwright browsers'
      inputs:
        key: 'playwright | "$(Agent.OS)" | package-lock.json'
        restoreKeys: |
          playwright | "$(Agent.OS)"
        path: $(PLAYWRIGHT_BROWSERS_PATH)

    # Install dependencies
    - script: npm ci --cache $(npm_config_cache)
      displayName: 'Install dependencies'

    # Install Playwright browsers
    - script: npx playwright install --with-deps chromium
      displayName: 'Install Playwright browsers'
      env:
        PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)

    # Run smoke tests
    - script: npx playwright test --project=chromium projects/gateway-ui/tests/smoke --reporter=junit
      displayName: 'Run smoke tests'
      env:
        CI: true
        PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)
      continueOnError: true

    # Run regression tests
    - script: npx playwright test --project=chromium projects/gateway-ui/tests/regression --reporter=junit
      displayName: 'Run regression tests'
      env:
        CI: true
        PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)
      continueOnError: true

    # Publish test results
    - task: PublishTestResults@2
      displayName: 'Publish test results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'test-results/junit-results.xml'
        testRunTitle: 'Playwright Test Results'
        mergeTestResults: true

    # Publish HTML report
    - task: PublishHtmlReport@1
      displayName: 'Publish HTML test report'
      condition: always()
      inputs:
        reportDir: 'playwright-report'
        tabName: 'Playwright Report'

    # Upload test artifacts
    - task: PublishPipelineArtifact@1
      displayName: 'Upload test artifacts'
      condition: always()
      inputs:
        targetPath: 'test-results'
        artifact: 'test-results'
        publishLocation: 'pipeline'

    # Upload screenshots and videos on failure
    - task: PublishPipelineArtifact@1
      displayName: 'Upload failure artifacts'
      condition: failed()
      inputs:
        targetPath: 'test-results/gateway-ui'
        artifact: 'failure-artifacts'
        publishLocation: 'pipeline'

- stage: Deploy_Reports
  displayName: 'Deploy Test Reports'
  dependsOn: Test
  condition: always()
  jobs:
  - job: DeployReports
    displayName: 'Deploy Test Reports'
    steps:
    
    # Download test artifacts
    - task: DownloadPipelineArtifact@2
      displayName: 'Download test artifacts'
      inputs:
        buildType: 'current'
        artifactName: 'test-results'
        targetPath: '$(Pipeline.Workspace)/test-results'

    # Deploy to test reporting service (placeholder)
    - script: echo "Deploy test reports to reporting service"
      displayName: 'Deploy test reports'