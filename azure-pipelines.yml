## Azure DevOps Pipeline for Playwright Test Automation
## Enterprise-grade CI/CD pipeline for Gateway UI test automation
#
## Trigger configuration

name: 'Gateway End to End Tests'

# Disable CI trigger - pipeline runs on schedule and manual trigger only
trigger: none

# Disable PR trigger
pr: none

# Run nightly at midnight UTC
# Docs: https://learn.microsoft.com/en-us/azure/devops/pipelines/process/scheduled-triggers
schedules:
  - cron: '0 0 * * *'
    displayName: 'Nightly midnight (UTC) build'
    branches:
      include:
        - master
    always: true

variables:
  - group: TestCredentials
  - group: NotificationsCredentials

pool:
  vmImage: ubuntu-latest

steps:
  # Install Node.js using the NodeTool task
  # Docs: https://learn.microsoft.com/en-us/azure/devops/pipelines/tasks/reference/use-node-v1
  - task: NodeTool@1
    inputs:
      version: '22.x'
    displayName: 'Install Node.js'

  # Install npm dependencies using a clean install
  # Docs: https://docs.npmjs.com/cli/v9/commands/npm-ci
  - script: npm ci
    displayName: 'Clean install npm dependencies'

  # Install Playwright browsers and dependencies
  # Docs: https://playwright.dev/docs/intro
  - script: npm run test:install-deps
    displayName: 'Install Playwright browsers'

  # Run Playwright tests in CI mode
  # Docs: https://playwright.dev/docs/ci
  - script: npm run test
    displayName: 'Run Playwright tests'
    env:
      CI: 'true'
      BASE_URL: 'https://qa-fairstonegateway.fairstone.co.uk'
      ADVISOR_EMAIL: $(ADVISOR_EMAIL)
      ADVISOR_PASSWORD: $(ADVISOR_PASSWORD)
      ADVISOR_OTP_SECRET: $(ADVISOR_OTP_SECRET)

  # Publish the Playwright HTML report as an artifact
  # Docs: https://learn.microsoft.com/en-us/azure/devops/pipelines/artifacts/pipeline-artifacts
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: 'playwright-report'
      artifact: playwright-report
      publishLocation: 'pipeline'
    condition: succeededOrFailed()

  # Publish JUnit test results to Azure Pipelines
  # Docs: https://learn.microsoft.com/en-us/azure/devops/pipelines/tasks/test/publish-test-results
  - task: PublishTestResults@2
    displayName: 'Publish test results'
    inputs:
      searchFolder: 'test-results'
      testResultsFormat: 'JUnit'
      testResultsFiles: 'junit-results.xml'
      mergeTestResults: true
      testRunTitle: 'Playwright Demo Tests'
    condition: succeededOrFailed()

  # Teams message for DEV deployment
  - template: pipeline-functions\teams-message.yml
    parameters:
      webhookUrl: $(TEAMS_WEBHOOK_URL)
      environment: 'QA'
      appName: 'Gateway/CDM/KYC'
      message: 'E2E Tests failed'
      url: $(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)