name: Playwright Tests

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        default: 'qa'
        type: choice
        options:
        - qa
        - staging
        - production

env:
  NODE_VERSION: '20'

jobs:
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: TypeScript compilation check
      run: npx tsc --noEmit

    - name: ESLint code quality check
      run: npx eslint . --ext .ts --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif
      continue-on-error: true

    - name: Upload ESLint results to GitHub
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: eslint-results.sarif
        wait-for-processing: true

    - name: Security audit
      run: npm audit --audit-level moderate
      continue-on-error: true

  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: npx playwright test --shard=${{ matrix.shard }}
      env:
        CI: true
        TEST_ENV: ${{ github.event.inputs.environment || 'qa' }}

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-results-${{ matrix.shard }}
        path: |
          test-results/
          playwright-report/
        retention-days: 30

    - name: Upload failure artifacts
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: failure-artifacts-${{ matrix.shard }}
        path: |
          test-results/gateway-ui/
        retention-days: 7

  merge-reports:
    name: Merge Test Reports
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-artifacts

    - name: Merge test reports
      run: |
        npx playwright merge-reports --reporter html ./all-artifacts/playwright-results-*/
        npx playwright merge-reports --reporter junit ./all-artifacts/playwright-results-*/ > merged-results.xml

    - name: Upload merged report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: merged-playwright-report
        path: |
          playwright-report/
          merged-results.xml
        retention-days: 30

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Playwright Test Results
        path: merged-results.xml
        reporter: java-junit

  deploy-reports:
    name: Deploy Test Reports
    if: always()
    needs: merge-reports
    runs-on: ubuntu-latest
    steps:
    - name: Download merged report
      uses: actions/download-artifact@v4
      with:
        name: merged-playwright-report
        path: report

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./report/playwright-report
        destination_dir: test-reports/${{ github.run_number }}

    - name: Comment PR with test results
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const path = './report/merged-results.xml';
          
          if (fs.existsSync(path)) {
            const results = fs.readFileSync(path, 'utf8');
            const testCount = (results.match(/tests="/g) || []).length;
            const failureCount = (results.match(/failures="/g) || []).length;
            
            const comment = `## 🎭 Playwright Test Results
            
            - **Tests Run:** ${testCount}
            - **Failures:** ${failureCount}
            - **Status:** ${failureCount === 0 ? '✅ All tests passed!' : '❌ Some tests failed'}
            
            📊 [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

  notify:
    name: Notify Results
    if: always()
    needs: [test, merge-reports]
    runs-on: ubuntu-latest
    steps:
    - name: Notify on failure
      if: needs.test.result == 'failure'
      run: |
        echo "Tests failed! Check the logs for details."
        # Add notification logic here (Slack, Teams, email, etc.)
        
    - name: Notify on success
      if: needs.test.result == 'success'
      run: |
        echo "All tests passed successfully!"
        # Add notification logic here